name: C/C++ CI

on: [push]

jobs:
  build:

    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: build
      run: |
        ./docker-build.sh

    - uses: actions/upload-artifact@v3
      with:
        name: archivarius
        path: docker-build-out/archivarius
